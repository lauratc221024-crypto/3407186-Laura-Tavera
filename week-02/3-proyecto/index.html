<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Trazabilidad Agrícola</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">

    <!-- HEADER -->
    <header class="header">
      <h1>🌾 Sistema de Trazabilidad Agrícola</h1>
      <p class="subtitle">Gestión y seguimiento de lotes agrícolas</p>

      <div class="stats-summary">
        <span class="stat">Total: <strong id="stat-total">0</strong></span>
        <span class="stat">Activos: <strong id="stat-active">0</strong></span>
        <span class="stat">Inactivos: <strong id="stat-inactive">0</strong></span>
      </div>
    </header>

    <!-- FORMULARIO -->
    <section class="form-section">
      <h2 id="form-title">🏡 Registrar Nuevo Lote</h2>

      <form id="item-form" class="item-form">

        <input type="hidden" id="item-id">

        <div class="form-group">
          <label for="codigo">Código del Lote *</label>
          <input type="text" id="codigo" required>
        </div>

        <div class="form-group">
          <label for="finca">Finca *</label>
          <input type="text" id="finca" required>
        </div>

        <div class="form-group">
          <label for="fecha">Fecha de Siembra *</label>
          <input type="date" id="fecha" required>
        </div>

        <div class="form-group">
          <label for="item-category">Tipo de Cultivo</label>
          <select id="item-category">
            <option value="fruta">🍎 Fruta</option>
            <option value="grano">🌾 Grano</option>
            <option value="cereal">🌽 Cereal</option>
            <option value="hortaliza">🥕 Hortaliza</option>
            <option value="legumbre">🫘 Legumbre</option>
            <option value="tuberculo">🥔 Tubérculo</option>
          </select>
        </div>

        <div class="form-group">
          <label for="item-priority">Nivel de Seguimiento</label>
          <select id="item-priority">
            <option value="low">🟢 Bajo</option>
            <option value="medium" selected>🟡 Medio</option>
            <option value="high">🔴 Alto</option>
          </select>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="submit-btn">
            Registrar Lote
          </button>
          <button type="button" class="btn btn-secondary" id="cancel-btn" style="display:none;">
            Cancelar
          </button>
        </div>

      </form>
    </section>

    <!-- FILTROS -->
    <section class="filters-section">
      <div class="filters">

        <div class="filter-group">
          <label for="filter-status">Estado:</label>
          <select id="filter-status">
            <option value="all">Todos</option>
            <option value="active">Activos</option>
            <option value="inactive">Inactivos</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="filter-category">Tipo de Cultivo:</label>
          <select id="filter-category">
            <option value="all">Todos</option>
            <option value="fruta">Fruta</option>
            <option value="grano">Grano</option>
            <option value="cereal">Cereal</option>
            <option value="hortaliza">Hortaliza</option>
            <option value="legumbre">Legumbre</option>
            <option value="tuberculo">Tubérculo</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="filter-priority">Nivel:</label>
          <select id="filter-priority">
            <option value="all">Todos</option>
            <option value="high">Alto</option>
            <option value="medium">Medio</option>
            <option value="low">Bajo</option>
          </select>
        </div>

        <div class="filter-group search-group">
          <label for="search-input">Buscar lote:</label>
          <input type="text" id="search-input" placeholder="Buscar por código o finca...">
        </div>

      </div>
    </section>

    <!-- LISTA -->
    <section class="items-section">
      <div class="items-header">
        <h2>📦 Lotes Registrados</h2>
        <button class="btn btn-outline" id="clear-inactive">
          🗑️ Eliminar Inactivos
        </button>
      </div>

      <div id="item-list" class="item-list"></div>

      <div id="empty-state" class="empty-state">
        <p>📭 No hay lotes registrados</p>
        <p class="empty-state-hint">Registra tu primer lote arriba</p>
      </div>
    </section>

    <!-- ESTADÍSTICAS -->
    <section class="detailed-stats">
      <h3>📊 Estadísticas de Trazabilidad</h3>
      <div id="stats-details" class="stats-grid"></div>
    </section>

  </div>

  <script src="starter/script.js"></script>
</body>
</html>
